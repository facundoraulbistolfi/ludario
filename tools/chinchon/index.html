<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chinchón · tabletop-helper</title>
  <meta name="description" content="Anotador de chinchón con jugadores configurables, historial y guardado manual." />
  <link rel="stylesheet" href="../../assets/site.css" />
  <style>
    body{background:linear-gradient(160deg,#0d2818 0%,#1a4a2e 40%,#0f3020 100%);color:#f5e6c8;font-family:'Playfair Display',Georgia,serif}
    .app{max-width:780px;margin:0 auto;padding:18px 0 44px;position:relative}
    .hero2{text-align:center;margin-bottom:22px;position:relative;z-index:1}
    .k{font-size:12px;letter-spacing:6px;color:#c9a96e;margin-bottom:6px}
    .hero2 h1{font-size:clamp(42px,8vw,64px);font-weight:900;font-style:italic;margin:0;line-height:1}
    .sub{margin-top:8px;color:rgba(245,230,200,.35);font-size:12px;letter-spacing:2px}
    .deck{position:absolute;inset:0;overflow:hidden;pointer-events:none}
    .deck span{position:absolute;font-family:serif;user-select:none}
    .panel{position:relative;z-index:1;background:rgba(0,0,0,.35);border-radius:16px;border:1px solid rgba(255,255,255,.1);padding:22px 18px;margin-bottom:16px}
    .label{font-size:11px;letter-spacing:3px;color:#c9a96e;margin-bottom:10px}
    .btn{border:none;cursor:pointer;font-family:'Playfair Display',Georgia,serif}
    .player-counts,.toolbar,.dealer-row{display:flex;gap:8px;flex-wrap:wrap}
    .pill{padding:6px 16px;border-radius:20px;font-size:16px;border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(245,230,200,.5)}
    .pill.active{border-color:#c9a96e;background:rgba(201,169,110,.2);color:#c9a96e}
    .text-input,.score-input,textarea{width:100%;box-sizing:border-box;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:8px;color:#f5e6c8;outline:none}
    .text-input{font-size:18px;padding:10px 14px;margin-bottom:10px;font-family:inherit}
    .action{width:100%;padding:14px;border-radius:10px;color:#f5e6c8;font-size:18px;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:linear-gradient(135deg,#8b2020,#c0392b)}
    .ghost{width:100%;margin-top:10px;padding:10px;border-radius:8px;background:transparent;border:1px solid rgba(255,255,255,.12);color:rgba(245,230,200,.38);font-size:13px}
    .load{margin-top:10px;background:rgba(0,0,0,.4);border-radius:10px;border:1px solid rgba(255,255,255,.1);padding:14px 12px}
    textarea{font-family:monospace;font-size:11px;padding:8px;resize:vertical}
    .load-actions{display:flex;gap:8px;margin-top:8px}
    .small-btn{flex:1;padding:8px;border-radius:6px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);color:rgba(245,230,200,.6);font-size:13px}
    .small-btn.primary{flex:2;background:rgba(201,169,110,.18);border-color:#c9a96e;color:#c9a96e;font-weight:700}
    .totals{display:grid;gap:10px;margin-bottom:18px}
    .total-card{background:rgba(0,0,0,.35);border-radius:12px;border:1px solid rgba(255,255,255,.1);padding:12px 8px 10px;text-align:center;position:relative;overflow:hidden}
    .name{font-size:10px;letter-spacing:2px;color:#c9a96e;margin-bottom:2px;text-transform:uppercase}
    .value{font-size:28px;font-weight:900}
    .bar{margin-top:6px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
    .bar > div{height:100%}
    .history{overflow:auto}
    table{width:100%;min-width:520px;border-collapse:collapse}
    th,td{padding:8px 10px;text-align:center}
    thead tr{border-bottom:1px solid rgba(255,255,255,.09)}
    th{font-size:10px;letter-spacing:2px;color:#c9a96e;font-weight:400}
    .rounds tbody tr{border-bottom:1px solid rgba(255,255,255,.04)}
    .total-row{border-top:2px solid rgba(201,169,110,.28);background:rgba(201,169,110,.04)}
    .round-setup{display:grid;gap:10px}
    .round-grid{display:grid;gap:10px;margin-bottom:14px}
    .round-card{text-align:center}
    .score-input{width:62px;font-size:17px;text-align:center;padding:6px 0;font-family:'Playfair Display',serif}
    .mini{padding:3px 11px;border-radius:12px;font-size:12px;border:1px solid rgba(255,255,255,.14);background:transparent;color:rgba(245,230,200,.38)}
    .mini.active{border-color:rgba(126,207,255,.7);background:rgba(126,207,255,.15);color:#7ecfff}
    .check{display:flex;justify-content:center;gap:4px;margin-top:5px;font-size:11px;color:rgba(245,230,200,.38)}
    .add{width:100%;padding:13px;border-radius:8px;background:linear-gradient(135deg,#1a6b3c,#27ae60);color:#f5e6c8;font-size:16px;font-weight:700;letter-spacing:2px}
    .toolbar{justify-content:center;margin-top:14px}
    .toolbar button{padding:6px 16px;border-radius:20px;font-size:12px;letter-spacing:1px}
    .toolbar .copy{background:rgba(201,169,110,.14);border:1px solid rgba(201,169,110,.4);color:#c9a96e}
    .toolbar .load-toggle{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.18);color:rgba(245,230,200,.65)}
    .winner{text-align:center;background:rgba(0,0,0,.5);border-radius:16px;border:1px solid rgba(201,169,110,.4);padding:36px 24px;margin-bottom:24px}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(20,60,35,.97);border:1px solid #c9a96e;color:#f5e6c8;padding:10px 24px;border-radius:8px;font-size:14px;z-index:999}
    @keyframes flash{0%{background:rgba(201,169,110,.07)}100%{background:transparent}}
    @media (max-width:760px){.panel{padding:18px 14px}}
  </style>
</head>
<body>
  <main class="page">
    <nav class="topbar">
      <a class="brand" href="../../">
        <span class="brand-mark">♟️</span>
        <span class="brand-copy">
          <span class="brand-label">tabletop-helper</span>
          <span class="brand-title">Chinchón</span>
        </span>
      </a>
      <div class="nav">
        <a href="../../">Inicio</a>
        <a href="../sudoku-killer/">Sudoku Killer</a>
      </div>
    </nav>

    <section class="app">
      <div class="deck" id="deck"></div>

      <div class="hero2">
        <div class="k">♣ ANOTADOR ♠</div>
        <h1>Chinchón</h1>
        <div class="sub">♥ límite: 100 puntos ♦</div>
        <div id="toolbar" class="toolbar" hidden>
          <button class="btn copy" type="button" id="copy-state">📋 Copiar partida</button>
          <button class="btn load-toggle" type="button" id="toggle-load">📂 Cargar partida</button>
        </div>
        <div id="load-box-top" hidden></div>
      </div>

      <section id="setup-view" class="panel">
        <div class="label">JUGADORES</div>
        <div id="player-counts" class="player-counts"></div>
        <div id="setup-inputs"></div>
        <button id="start-game" class="btn action" type="button">Comenzar partida</button>
        <button id="toggle-load-setup" class="btn ghost" type="button">📂 Cargar partida guardada</button>
        <div id="load-box-setup" hidden></div>
      </section>

      <section id="winner-view" hidden></section>

      <section id="game-view" hidden>
        <div id="totals" class="totals"></div>
        <div id="history-box" class="panel history" hidden></div>

        <div class="panel">
          <div class="round-setup">
            <div>
              <div class="label" style="margin-bottom:7px;color:rgba(126,207,255,.65)">🃏 REPARTE EN RONDA <span id="next-round-label">1</span></div>
              <div id="dealer-row" class="dealer-row"></div>
            </div>
            <div>
              <div class="label">RONDA <span id="round-label">1</span></div>
              <div id="round-grid" class="round-grid"></div>
            </div>
            <button id="add-round" class="btn add" type="button">+ Agregar ronda</button>
          </div>
        </div>

        <button id="reset-game" class="btn ghost" type="button">Reiniciar partida</button>
      </section>
    </section>
  </main>

  <script>
    const LIMIT = 100;
    const suits = ['♠','♥','♦','♣'];
    const deck = document.getElementById('deck');
    for(let i=0;i<14;i+=1){
      const span = document.createElement('span');
      span.textContent = suits[i % 4];
      span.style.fontSize = `${10 + ((i * 7 + 3) % 18)}px`;
      span.style.top = `${(i * 37 + 11) % 100}%`;
      span.style.left = `${(i * 53 + 7) % 100}%`;
      span.style.transform = `rotate(${(i * 47) % 360}deg)`;
      span.style.color = i % 2 === 0 ? 'rgba(180,30,30,.06)' : 'rgba(0,0,0,.05)';
      deck.appendChild(span);
    }

    let phase = 'setup';
    let players = [];
    let playerCount = 2;
    let setupNames = ['Facu', 'Dai'];
    let roundInputs = [];
    let chinchonFlags = [];
    let minusTenFlags = [];
    let dealerIdx = 0;
    let roundDealers = [];
    let winner = null;
    let loadTopOpen = false;
    let loadSetupOpen = false;
    let toastTimer = null;

    const setupView = document.getElementById('setup-view');
    const gameView = document.getElementById('game-view');
    const winnerView = document.getElementById('winner-view');
    const playerCounts = document.getElementById('player-counts');
    const setupInputs = document.getElementById('setup-inputs');
    const totals = document.getElementById('totals');
    const historyBox = document.getElementById('history-box');
    const dealerRow = document.getElementById('dealer-row');
    const roundGrid = document.getElementById('round-grid');
    const roundLabel = document.getElementById('round-label');
    const nextRoundLabel = document.getElementById('next-round-label');
    const toolbar = document.getElementById('toolbar');

    function makePlayers(names){
      return names.map(name => ({ name, scores: [], eliminated: false, chinchon: false }));
    }
    function total(player){ return player.scores.reduce((a,b) => a + b, 0); }
    function emptyInputs(length){ return Array(length).fill(''); }
    function emptyFlags(length){ return Array(length).fill(false); }

    function fireToast(message){
      document.querySelector('.toast')?.remove();
      clearTimeout(toastTimer);
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      toastTimer = setTimeout(() => toast.remove(), 2300);
    }

    function renderLoadBox(hostId, isOpen){
      const host = document.getElementById(hostId);
      host.hidden = !isOpen;
      if(!isOpen){ host.innerHTML = ''; return; }
      host.innerHTML = `
        <div class="load">
          <textarea id="${hostId}-text" rows="3" placeholder="Pegá el texto de la partida acá…"></textarea>
          <div class="load-actions">
            <button class="btn small-btn" type="button" id="${hostId}-paste">📋 Pegar</button>
            <button class="btn small-btn primary" type="button" id="${hostId}-apply">Cargar ✓</button>
          </div>
        </div>
      `;
      const text = document.getElementById(`${hostId}-text`);
      text.value = host.dataset.value || '';
      text.oninput = (e) => { host.dataset.value = e.target.value; };
      document.getElementById(`${hostId}-paste`).onclick = async () => {
        try {
          const clip = await navigator.clipboard.readText();
          host.dataset.value = clip;
          text.value = clip;
        } catch {
          fireToast('No se pudo leer el portapapeles');
        }
      };
      document.getElementById(`${hostId}-apply`).onclick = () => applyLoad(host.dataset.value || '');
    }

    function applyLoad(raw){
      try{
        const state = JSON.parse(raw.trim());
        if(!Array.isArray(state.players)) throw new Error('invalid');
        players = state.players;
        phase = state.phase || 'game';
        winner = state.winner || null;
        dealerIdx = state.dealerIdx ?? 0;
        roundDealers = state.roundDealers || [];
        roundInputs = emptyInputs(players.length);
        chinchonFlags = emptyFlags(players.length);
        minusTenFlags = emptyFlags(players.length);
        loadTopOpen = false;
        loadSetupOpen = false;
        fireToast('✓ Partida cargada');
        render();
      }catch{
        fireToast('❌ Texto inválido');
      }
    }

    function copyState(){
      const state = { v: 1, phase, players, dealerIdx, roundDealers, winner };
      navigator.clipboard.writeText(JSON.stringify(state))
        .then(() => fireToast('✓ Partida copiada al portapapeles'))
        .catch(() => fireToast('No se pudo copiar'));
    }

    function startGame(){
      const names = setupNames.slice(0, playerCount).map((name, index) => name.trim() || `Jugador ${index + 1}`);
      players = makePlayers(names);
      roundInputs = emptyInputs(playerCount);
      chinchonFlags = emptyFlags(playerCount);
      minusTenFlags = emptyFlags(playerCount);
      dealerIdx = 0;
      roundDealers = [];
      winner = null;
      phase = 'game';
      loadSetupOpen = false;
      render();
    }

    function reset(){
      phase = 'setup';
      winner = null;
      playerCount = players.length || playerCount;
      setupNames = (players.length ? players.map(player => player.name) : setupNames).slice(0, 6);
      roundDealers = [];
      dealerIdx = 0;
      loadTopOpen = false;
      loadSetupOpen = false;
      render();
    }

    function evaluateWinner(){
      const active = players.filter(player => !player.eliminated && !player.chinchon);
      const chinchonPlayer = players.find(player => player.chinchon);
      if(chinchonPlayer){
        winner = { name: chinchonPlayer.name, reason: '¡CHINCHÓN!' };
        phase = 'over';
        return;
      }
      if(active.length === 1){
        winner = { name: active[0].name, reason: 'único sobreviviente' };
        phase = 'over';
        return;
      }
      if(active.length === 0){
        const best = [...players].sort((a,b) => total(a) - total(b))[0];
        winner = { name: best?.name ?? '?', reason: 'menor puntaje' };
        phase = 'over';
      }
    }

    function addRound(){
      const parsed = roundInputs.map((value, index) => {
        const player = players[index];
        if(player.eliminated || player.chinchon) return 0;
        if(chinchonFlags[index]) return 'chinchon';
        const base = Number.parseInt(value, 10);
        if(Number.isNaN(base)) return null;
        return minusTenFlags[index] ? base - 10 : base;
      });

      const missing = players.some((player, index) => !player.eliminated && !player.chinchon && !chinchonFlags[index] && parsed[index] === null);
      if(missing){
        fireToast('Faltan puntajes');
        return;
      }

      players = players.map((player, index) => {
        if(player.eliminated || player.chinchon) return player;
        if(parsed[index] === 'chinchon') return { ...player, chinchon: true };
        return { ...player, scores: [...player.scores, parsed[index]] };
      }).map(player => ({ ...player, eliminated: !player.chinchon && total(player) >= LIMIT }));

      roundDealers.push(dealerIdx);

      let nextDealer = (dealerIdx + 1) % players.length;
      for(let turns=0; turns<players.length; turns+=1){
        if(!players[nextDealer].eliminated && !players[nextDealer].chinchon) break;
        nextDealer = (nextDealer + 1) % players.length;
      }
      dealerIdx = nextDealer;

      roundInputs = emptyInputs(players.length);
      chinchonFlags = emptyFlags(players.length);
      minusTenFlags = emptyFlags(players.length);

      evaluateWinner();
      render();
      historyBox.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }

    function renderSetup(){
      playerCounts.innerHTML = '';
      for(let count=2; count<=6; count+=1){
        const button = document.createElement('button');
        button.type = 'button';
        button.className = `btn pill ${playerCount === count ? 'active' : ''}`;
        button.textContent = count;
        button.onclick = () => { playerCount = count; renderSetup(); };
        playerCounts.appendChild(button);
      }

      setupInputs.innerHTML = '';
      for(let i=0; i<playerCount; i+=1){
        const input = document.createElement('input');
        input.className = 'text-input';
        input.placeholder = `Jugador ${i + 1}`;
        input.value = setupNames[i] || '';
        input.oninput = (e) => { setupNames[i] = e.target.value; };
        setupInputs.appendChild(input);
      }

      renderLoadBox('load-box-setup', loadSetupOpen);
    }

    function renderTotals(){
      totals.innerHTML = '';
      totals.style.gridTemplateColumns = `repeat(${players.length}, 1fr)`;
      players.forEach((player, index) => {
        const score = total(player);
        const pct = Math.min(score / LIMIT * 100, 100);
        const danger = score >= LIMIT * 0.7;
        const isDealer = phase === 'game' && dealerIdx === index && !player.eliminated && !player.chinchon;
        const card = document.createElement('div');
        card.className = 'total-card';
        card.style.borderColor = player.eliminated ? 'rgba(200,50,50,.4)' : player.chinchon ? 'rgba(201,169,110,.6)' : isDealer ? 'rgba(100,180,255,.45)' : 'rgba(255,255,255,.1)';
        card.style.opacity = player.eliminated ? '.5' : '1';
        card.innerHTML = `
          ${player.chinchon ? '<div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#c9a96e,#e8c97a,#c9a96e)"></div>' : ''}
          ${isDealer ? '<div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#5bb3ff,#a0d8ff,#5bb3ff)"></div><div style="font-size:9px;letter-spacing:2px;color:#7ecfff;margin-bottom:2px">🃏 REPARTE</div>' : ''}
          <div class="name">${player.name}</div>
          <div class="value" style="color:${player.chinchon ? '#e8c97a' : danger ? '#e87a7a' : '#f5e6c8'}">${player.chinchon ? '🎴' : player.eliminated ? '✗' : score}</div>
          ${(!player.chinchon && !player.eliminated) ? `<div class="bar"><div style="width:${pct}%;background:${danger ? 'linear-gradient(90deg,#c0392b,#e74c3c)' : 'linear-gradient(90deg,#27ae60,#2ecc71)'}"></div></div>` : ''}
        `;
        totals.appendChild(card);
      });
    }

    function renderHistory(){
      const maxRounds = Math.max(...players.map(player => player.scores.length), 0);
      if(!maxRounds){
        historyBox.hidden = true;
        historyBox.innerHTML = '';
        return;
      }
      historyBox.hidden = false;

      let rows = '';
      for(let round=0; round<maxRounds; round+=1){
        rows += `<tr${round === maxRounds - 1 ? ' style="animation:flash .7s"' : ''}>
          <td style="text-align:left;color:rgba(245,230,200,.3)">${round + 1}</td>
          <td style="color:rgba(126,207,255,.55)">${roundDealers[round] !== undefined ? (players[roundDealers[round]]?.name?.slice(0,4) ?? '?') : '—'}</td>
          ${players.map(player => {
            const value = player.scores[round];
            const negative = typeof value === 'number' && value < 0;
            const color = value === undefined ? 'rgba(245,230,200,.13)' : value === 0 ? '#7ee87e' : negative ? '#7ecfff' : '#f5e6c8';
            return `<td style="color:${color}">${value === undefined ? '—' : value}</td>`;
          }).join('')}
        </tr>`;
      }

      historyBox.innerHTML = `
        <table class="rounds">
          <thead>
            <tr>
              <th style="text-align:left">#</th>
              <th>🃏</th>
              ${players.map(player => `<th>${player.name}</th>`).join('')}
            </tr>
          </thead>
          <tbody>
            ${rows}
            <tr class="total-row">
              <td colspan="2" style="text-align:left">TOTAL</td>
              ${players.map(player => `<td style="font-weight:700;font-size:16px;color:${player.eliminated ? '#e87a7a' : player.chinchon ? '#e8c97a' : '#f5e6c8'}">${player.chinchon ? '🎴' : total(player)}</td>`).join('')}
            </tr>
          </tbody>
        </table>
      `;
    }

    function renderRoundInputs(){
      const maxRounds = Math.max(...players.map(player => player.scores.length), 0);
      roundLabel.textContent = maxRounds + 1;
      nextRoundLabel.textContent = maxRounds + 1;
      dealerRow.innerHTML = '';
      players.forEach((player, index) => {
        if(player.eliminated || player.chinchon) return;
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'btn mini' + (dealerIdx === index ? ' active' : '');
        button.textContent = player.name;
        button.onclick = () => { dealerIdx = index; renderRoundInputs(); renderTotals(); };
        dealerRow.appendChild(button);
      });

      roundGrid.innerHTML = '';
      roundGrid.style.gridTemplateColumns = `repeat(${players.length}, 1fr)`;
      players.forEach((player, index) => {
        const card = document.createElement('div');
        card.className = 'round-card';
        card.style.opacity = player.eliminated ? '.3' : '1';

        if(!player.eliminated && !player.chinchon){
          card.innerHTML = `
            <div class="name" style="margin-bottom:6px">${player.name}</div>
            <input class="score-input" type="number" min="-10" max="110" placeholder="pts" ${chinchonFlags[index] ? 'disabled' : ''} value="${chinchonFlags[index] ? '' : (roundInputs[index] || '')}">
            <div style="margin-top:6px"><button class="btn mini ${minusTenFlags[index] ? 'active' : ''}" type="button">${minusTenFlags[index] ? '−10 ✓' : '−10'}</button></div>
            <label class="check"><input type="checkbox" ${chinchonFlags[index] ? 'checked' : ''}> Chinchón</label>
          `;
          const input = card.querySelector('input.score-input');
          input.oninput = (e) => { roundInputs[index] = e.target.value; };
          card.querySelector('button').onclick = () => {
            minusTenFlags[index] = !minusTenFlags[index];
            renderRoundInputs();
          };
          card.querySelector('label input').onchange = (e) => {
            chinchonFlags[index] = e.target.checked;
            if(e.target.checked){
              roundInputs[index] = '';
              minusTenFlags[index] = false;
            }
            renderRoundInputs();
          };
        } else {
          card.innerHTML = `
            <div class="name" style="margin-bottom:6px">${player.name}</div>
            <div style="font-size:12px;color:rgba(245,230,200,.22);font-style:italic;margin-top:8px">${player.chinchon ? '🎴' : 'eliminado'}</div>
          `;
        }

        roundGrid.appendChild(card);
      });
    }

    function renderWinner(){
      if(phase !== 'over' || !winner){
        winnerView.hidden = true;
        winnerView.innerHTML = '';
        return;
      }
      winnerView.hidden = false;
      winnerView.className = 'winner';
      winnerView.innerHTML = `
        <div style="font-size:48px;margin-bottom:8px">🎴</div>
        <div style="font-size:11px;letter-spacing:4px;color:#c9a96e;margin-bottom:8px">GANADOR</div>
        <div style="font-size:40px;font-weight:900;font-style:italic">${winner.name}</div>
        <div style="color:rgba(245,230,200,.55);margin-top:6px;font-style:italic">${winner.reason}</div>
        <button id="winner-reset" class="btn" type="button" style="margin-top:24px;padding:12px 32px;background:transparent;border:1px solid #c9a96e;border-radius:8px;color:#c9a96e;font-size:16px;letter-spacing:2px">Nueva partida</button>
      `;
      document.getElementById('winner-reset').onclick = reset;
    }

    function render(){
      setupView.hidden = phase !== 'setup';
      gameView.hidden = phase === 'setup';
      toolbar.hidden = phase === 'setup';

      document.getElementById('toggle-load').style.background = loadTopOpen ? 'rgba(201,169,110,.22)' : 'rgba(255,255,255,.07)';
      renderLoadBox('load-box-top', loadTopOpen);
      renderLoadBox('load-box-setup', loadSetupOpen);

      renderSetup();
      renderWinner();

      if(phase !== 'setup'){
        renderTotals();
        renderHistory();
        renderRoundInputs();
      }
    }

    document.getElementById('start-game').onclick = startGame;
    document.getElementById('add-round').onclick = addRound;
    document.getElementById('reset-game').onclick = reset;
    document.getElementById('copy-state').onclick = copyState;
    document.getElementById('toggle-load').onclick = () => { loadTopOpen = !loadTopOpen; render(); };
    document.getElementById('toggle-load-setup').onclick = () => { loadSetupOpen = !loadSetupOpen; render(); };

    players = makePlayers(['Facu', 'Dai']);
    roundInputs = emptyInputs(2);
    chinchonFlags = emptyFlags(2);
    minusTenFlags = emptyFlags(2);
    render();
  </script>
</body>
</html>
